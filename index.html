<style>

body{
    margin:0;
    font-family:Segoe UI, Arial;
    min-height:100vh;
    flex-direction: column;
    background:url("https://th.bing.com/th/id/R.46256165c2d4f971627d27799ba43a77?rik=0COLh7gcuM%2f%2fjQ&riu=http%3a%2f%2fclipart-library.com%2fimg%2f1986283.jpg&ehk=%2ffH6cXpEfmddGWTlim5JMd%2fuiOLEflbuFZvcQko4MK0%3d&risl=1&pid=ImgRaw&r=0")

.wrapper{
    flex: 1;
    height:flex-grow;
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 20px 0;
}

.panel{
    width:620px;
    padding:25px;
    border-radius:12px;
    background:rgba(255, 255, 255, 0.192);
    backdrop-filter:blur(5px);
    display:flex;
    gap:25px;
    color:rgb(0, 0, 0);
}


.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgb(255, 255, 255);
    object-fit:cover;

.file{
    margin-top:10px;
    font-size:12px;

<body>


<div class="wrapper">
<div class="panel">

   
    <div class="left">
        <img id="preview"
        class="avatar"
        src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

        <input class="file" type="file" id="photo" accept="image/*">
        <button class="uploadBtn" onclick="uploadPhoto()">
            Upload Photo
        </button>
    </div>

   
    <div class="right">
        First Name:
        <input type="text" id="name" placeholder="Enter">

        Last Name:
         <input type="text" id="lastName" placeholder="Enter">

        Age:
        <input type="number" id="age" placeholder="Enter">

        Contact Number:
        <input type="text" id="number" placeholder="Enter">

        Email:
        <input type="Email" id="Email" placeholder="Enter">

        Username:
        <input type="user" id="user" placeholder="Enter">

        Password:
        <input type="pass" id="pass" placeholder="Enter">

        <label class="small">
            <input type="checkbox" id="terms">
            I accept the Terms of Use and Privacy Policy
        </label>

        <button class="createBtn" onclick="location.href='confirmation.html'" >
            Create my account
        </button>

        <button class="cancelBtn" onclick="clearForm()">
            Cancel
        </button>

    </div>

</div>
</div>


<script>


function uploadPhoto(){
    const file = document.getElementById("photo").files[0];
    if(!file){
        alert("Please choose a photo first.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e){
        document.getElementById("preview").src = e.target.result;
        alert("Your profile pic has been uploaded.");
    };
    reader.readAsDataURL(file);
}


function createAccount(){

    let name = nameInput = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let terms = document.getElementById("terms").checked;

    if(!name || !email || !user || !pass){
        alert("Please complete all fields.");
        return;
    }

    if(!terms){
        alert("You must accept the Terms first.");
        return;
    }

    alert("Account successfully created!");
}


</script>
